[pytest]
testpaths = tests
python_files = test_*.py
norecursedirs = test_outputs .git temp __pycache__
addopts = -ra --strict-markers
markers =
    unit: чистые тесты без сети/БД (по умолчанию всегда запускаются)
    integration: нужны API-ключи и интернет
    slow: долгие (YouTube, рендер полного видео)
    requires_db: нужен PostgreSQL на DATABASE_URL
